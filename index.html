<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta de Demérito</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-dark:  #0a2463;
    --blue-mid:   #1565c0;
    --blue-light: #1e88e5;
    --blue-pale:  #e3f0ff;
    --white:      #ffffff;
    --ink:        #1a2540;
    --ink-light:  #4a5568;
    --line:       #b0c4de;
    --bg:         #eaf2fb;
    --paper:      #ffffff;
    --focus:      #1e88e5;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Sans 3', sans-serif;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(21,101,192,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 90%, rgba(10,36,99,0.10) 0%, transparent 55%);
  }

  .wrapper { width: 100%; max-width: 740px; }

  .card {
    background: var(--paper);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(10,36,99,0.08), 0 16px 48px rgba(10,36,99,0.16);
    animation: fadeIn 0.55s cubic-bezier(.22,.68,0,1.2);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── HEADER ── */
  .card-header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 60%, var(--blue-light) 100%);
    padding: 2rem 2.5rem 1.6rem;
    position: relative;
    overflow: hidden;
  }
  .card-header::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .card-header::after {
    content: ''; position: absolute; bottom: -30px; left: 30%;
    width: 220px; height: 220px; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .holes { display: flex; justify-content: space-between; padding: 0 8%; margin-bottom: 1.2rem; }
  .hole {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.35);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.25);
  }

  .header-content {
    display: flex; align-items: center; justify-content: center;
    gap: 1.2rem; position: relative; z-index: 1;
  }

  .logo-seal {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.92);
    border: 2.5px solid rgba(255,255,255,0.8);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .logo-seal svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 1.8; }

  .header-text { text-align: center; }
  .header-text h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem; font-weight: 800; letter-spacing: 0.07em;
    color: var(--white); text-transform: uppercase; line-height: 1.35;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .header-text .district {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.76rem; font-weight: 400; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.8); margin-top: 0.3rem; text-transform: uppercase;
  }

  .title-badge { display: flex; justify-content: center; margin-top: 1.4rem; position: relative; z-index: 1; }
  .title-badge span {
    background: white; color: var(--blue-dark);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.88rem; font-weight: 800; letter-spacing: 0.2em;
    text-transform: uppercase; padding: 0.45rem 2.2rem;
    border-radius: 50px; box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  /* ── BODY ── */
  .card-body { padding: 2rem 2.5rem 2.5rem; }

  .inst-strip {
    background: var(--blue-pale);
    border-left: 4px solid var(--blue-mid);
    border-radius: 0 6px 6px 0;
    padding: 0.9rem 1.2rem;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1rem; margin-bottom: 1.8rem;
  }

  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--blue-mid);
  }
  .field input, .field textarea {
    background: transparent; border: none;
    border-bottom: 1.5px solid var(--line); outline: none;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem; color: var(--ink); padding: 3px 2px 5px;
    transition: border-color 0.25s, background 0.25s;
  }
  .field input:focus, .field textarea:focus {
    border-bottom-color: var(--focus);
    background: rgba(30,136,229,0.04);
  }
  .field input[readonly] { cursor: default; }

  /* Clickable field trigger */
  .field-trigger {
    display: flex; flex-direction: column; gap: 3px;
  }
  .field-trigger label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--blue-mid);
  }
  .input-btn {
    display: flex; align-items: center; gap: 0.5rem;
    border-bottom: 1.5px solid var(--line);
    padding: 3px 2px 5px;
    cursor: pointer;
    transition: border-color 0.25s;
  }
  .input-btn:hover { border-bottom-color: var(--blue-mid); }
  .input-btn input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem; color: var(--ink);
    cursor: pointer;
  }
  .input-btn .icon-btn {
    background: var(--blue-mid); color: white;
    border: none; border-radius: 50%;
    width: 22px; height: 22px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; cursor: pointer;
    transition: background 0.2s;
  }
  .input-btn .icon-btn:hover { background: var(--blue-dark); }

  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--blue-mid);
    border-bottom: 2px solid var(--blue-pale);
    padding-bottom: 0.3rem; margin-bottom: 1rem; margin-top: 1.6rem;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  .grid-3 { display: grid; grid-template-columns: 0.8fr 1.2fr 1fr; gap: 1.2rem; }

  .textarea-field { margin-bottom: 1.2rem; }
  .textarea-field label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--blue-mid);
    display: block; margin-bottom: 0.35rem;
  }
  .textarea-field textarea {
    width: 100%;
    background: var(--blue-pale);
    border: 1.5px solid #c5d8f0; border-radius: 6px;
    outline: none; font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem; color: var(--ink);
    padding: 0.6rem 0.8rem; resize: none; min-height: 78px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .textarea-field textarea:focus {
    border-color: var(--focus);
    box-shadow: 0 0 0 3px rgba(30,136,229,0.12);
  }

  /* Motivo trigger */
  .motivo-trigger-wrap { margin-bottom: 1.2rem; }
  .motivo-trigger-wrap label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--blue-mid);
    display: block; margin-bottom: 0.35rem;
  }
  .motivo-display {
    width: 100%;
    background: var(--blue-pale);
    border: 1.5px solid #c5d8f0; border-radius: 6px;
    padding: 0.6rem 0.8rem;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem; color: var(--ink);
    min-height: 78px;
    cursor: pointer;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
    transition: border-color 0.25s, box-shadow 0.25s;
    position: relative;
  }
  .motivo-display:hover {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(30,136,229,0.10);
  }
  .motivo-display .motivo-text { flex: 1; white-space: pre-wrap; line-height: 1.5; }
  .motivo-display .motivo-text.placeholder { color: #9db8d8; font-style: italic; }
  .motivo-display .edit-icon {
    background: var(--blue-mid); color: white; border-radius: 50%;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; margin-top: 2px;
  }

  /* Signatures */
  .signatures {
    margin-top: 1.8rem; background: var(--blue-pale);
    border-radius: 8px; padding: 1.4rem 1.6rem;
  }
  .sig-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--blue-mid); margin-bottom: 1.1rem;
  }
  .sig-row {
    display: grid; grid-template-columns: 1.7fr 1fr;
    gap: 1.5rem; margin-bottom: 1.1rem; align-items: end;
  }
  .sig-row:last-child { margin-bottom: 0; }

  /* Buttons */
  .actions {
    display: flex; gap: 0.8rem; justify-content: flex-end;
    margin-top: 2rem; padding-top: 1.5rem;
    border-top: 1.5px solid var(--blue-pale);
  }
  .btn {
    padding: 0.6rem 1.6rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    border-radius: 50px; border: none;
  }
  .btn-outline { background: transparent; border: 2px solid var(--line); color: var(--ink-light); }
  .btn-outline:hover { border-color: var(--blue-mid); color: var(--blue-mid); }
  .btn-print { background: transparent; border: 2px solid var(--blue-mid); color: var(--blue-mid); }
  .btn-print:hover { background: var(--blue-pale); }
  .btn-pdf { background: transparent; border: 2px solid #e65100; color: #e65100; }
  .btn-pdf:hover { background: #fff3e0; }
  .btn-pdf.loading { opacity: 0.6; cursor: wait; }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
    color: white; box-shadow: 0 4px 14px rgba(21,101,192,0.35);
  }
  .btn-primary:hover { box-shadow: 0 6px 20px rgba(21,101,192,0.45); transform: translateY(-1px); }

  /* ══════════════════════════════════════════
     MODAL BASE
  ══════════════════════════════════════════ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,36,99,0.45); backdrop-filter: blur(4px);
    z-index: 1000; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.active { display: flex; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: white; border-radius: 14px;
    box-shadow: 0 24px 80px rgba(10,36,99,0.3);
    width: 100%; max-width: 520px;
    max-height: 85vh; display: flex; flex-direction: column;
    animation: modalIn 0.3s cubic-bezier(.22,.68,0,1.2);
    overflow: hidden;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
    padding: 1.2rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-header h2 {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.88rem; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase; color: white;
  }
  .modal-close {
    background: rgba(255,255,255,0.2); border: none; color: white;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: background 0.2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.35); }

  .modal-search {
    padding: 0.9rem 1.2rem; border-bottom: 1px solid #e8eef6; flex-shrink: 0;
  }
  .modal-search input {
    width: 100%; background: var(--blue-pale);
    border: 1.5px solid #c5d8f0; border-radius: 8px;
    outline: none; font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem; color: var(--ink); padding: 0.5rem 0.8rem;
    transition: border-color 0.25s;
  }
  .modal-search input:focus { border-color: var(--focus); }

  .modal-body { overflow-y: auto; flex: 1; padding: 0.5rem; }

  /* Student list */
  .student-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.75rem 1rem; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid #f0f4fa;
  }
  .student-item:hover { background: var(--blue-pale); }
  .student-item:last-child { border-bottom: none; }

  .student-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--blue-pale); color: var(--blue-mid);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .student-info { flex: 1; }
  .student-name {
    font-size: 0.88rem; font-weight: 600; color: var(--ink); line-height: 1.2;
  }
  .student-nie {
    font-size: 0.75rem; color: var(--ink-light); margin-top: 1px;
  }
  .student-item:hover .student-num { background: var(--blue-mid); color: white; }
  .selected-row { background: var(--blue-pale) !important; }

  /* Motivo list */
  .motivo-item {
    display: flex; align-items: flex-start; gap: 0.8rem;
    padding: 0.85rem 1rem; border-radius: 8px;
    cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid #f0f4fa;
  }
  .motivo-item:hover { background: var(--blue-pale); }
  .motivo-item:last-child { border-bottom: none; }
  .motivo-item.selected { background: #dbeeff; }

  .motivo-letter {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--blue-dark); color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.72rem; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .motivo-item.selected .motivo-letter { background: var(--blue-light); }
  .motivo-text-label {
    flex: 1; font-size: 0.88rem; color: var(--ink); line-height: 1.4;
  }
  .motivo-check {
    width: 18px; height: 18px; border: 2px solid var(--line);
    border-radius: 4px; flex-shrink: 0; margin-top: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .motivo-item.selected .motivo-check {
    background: var(--blue-mid); border-color: var(--blue-mid); color: white;
  }
  .motivo-check::after { content: '✓'; font-size: 11px; opacity: 0; }
  .motivo-item.selected .motivo-check::after { opacity: 1; }

  .modal-footer {
    padding: 0.9rem 1.2rem; border-top: 1px solid #e8eef6;
    display: flex; justify-content: flex-end; gap: 0.6rem; flex-shrink: 0;
  }

  @media print {
    body { background: white; padding: 0; }
    .card { box-shadow: none; border-radius: 0; }
    .card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .actions, .modal-overlay { display: none !important; }
    .input-btn .icon-btn, .edit-icon { display: none; }
  }

  @media (max-width: 580px) {
    .card-body { padding: 1.5rem 1.2rem; }
    .card-header { padding: 1.5rem 1.2rem 1.2rem; }
    .inst-strip, .grid-2, .grid-3, .sig-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">

    <!-- HEADER -->
    <div class="card-header">
      <div class="holes"><div class="hole"></div><div class="hole"></div></div>
      <div class="header-content">
        <div class="logo-seal">
          <img src="https://i.postimg.cc/pT7HhC8T/Picsart-25-10-23-08-50-36-529.png" alt="Logo Institución" style="width:54px;height:54px;object-fit:contain;border-radius:50%;">
        </div>
        <div class="header-text">
          <h1>Ministerio de Educación,<br>Ciencia y Tecnología</h1>
          <p class="district">Distrito 06-14 &nbsp;·&nbsp; Panchimalco, San Salvador Sur</p>
        </div>
      </div>
      <div class="title-badge"><span>Tarjeta de Demérito</span></div>
    </div>

    <!-- BODY -->
    <div class="card-body">

      <!-- Institución -->
      <div class="inst-strip">
        <div class="field">
          <label>Institución</label>
          <input type="text" id="institucion" value="COMPLEJO EDUCATIVO CANTÓN SAN ISIDRO" readonly>
        </div>
        <div class="field">
          <label>Código</label>
          <input type="text" id="codigo" value="70056" readonly>
        </div>
      </div>

      <!-- Datos del alumno -->
      <div class="section-label">Datos del Alumno/A</div>
      <div class="grid-2" style="margin-bottom:1.2rem">
        <div class="field-trigger">
          <label>Nombre</label>
          <div class="input-btn" onclick="abrirModalEstudiante()">
            <input type="text" id="nombre_alumno" placeholder="Seleccionar estudiante..." readonly>
            <button class="icon-btn" type="button" title="Seleccionar">👤</button>
          </div>
        </div>
        <div class="field">
          <label>Apellido</label>
          <input type="text" id="apellido_alumno" readonly placeholder="—">
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label>NIE</label>
          <input type="text" id="nie" readonly placeholder="—">
        </div>
        <div class="field">
          <label>Grado / Sección</label>
          <input type="text" id="grado_seccion" value="1° Año General" readonly>
        </div>
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="fecha">
        </div>
      </div>

      <!-- Motivo -->
      <div class="section-label">Detalle del Demérito</div>
      <div class="motivo-trigger-wrap">
        <label>Motivo del Demérito</label>
        <div class="motivo-display" onclick="abrirModalMotivo()">
          <span class="motivo-text placeholder" id="motivo_display">Toca para seleccionar el motivo…</span>
          <span class="edit-icon">✏️</span>
        </div>
        <input type="hidden" id="motivo_valor">
      </div>

      <div class="textarea-field">
        <label>Observación del Docente</label>
        <textarea id="observacion" rows="3" placeholder="Observaciones adicionales..."></textarea>
      </div>

      <!-- Firmas -->
      <div class="signatures">
        <div class="sig-title">Firmas y Responsables</div>
        <div class="sig-row">
          <div class="field-trigger">
            <label>Nombre Docente</label>
            <div class="input-btn" onclick="abrirModalDocente()">
              <input type="text" id="nombre_docente" placeholder="Seleccionar docente..." readonly>
              <button class="icon-btn" type="button" title="Seleccionar">🎓</button>
            </div>
          </div>
          <div class="field"><label>Firma</label><input type="text" id="firma_docente"></div>
        </div>
        <div class="sig-row">
          <div class="field"><label>Nombre Alumno</label><input type="text" id="nombre_alumno_firma" readonly></div>
          <div class="field"><label>Firma</label><input type="text" id="firma_alumno"></div>
        </div>
        <div class="sig-row">
          <div class="field"><label>Nombre Responsable</label><input type="text" id="nombre_responsable"></div>
          <div class="field"><label>Firma</label><input type="text" id="firma_responsable"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-outline" onclick="limpiar()">Limpiar</button>
        <button class="btn btn-print" onclick="window.print()">🖨 Imprimir</button>
        <button class="btn btn-pdf" onclick="descargarPDF()" id="btnPDF">📄 PDF Carta</button>
        <button class="btn btn-primary" onclick="guardar()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL ESTUDIANTE ══ -->
<div class="modal-overlay" id="modalEstudiante">
  <div class="modal">
    <div class="modal-header">
      <h2>Seleccionar Estudiante</h2>
      <button class="modal-close" onclick="cerrarModal('modalEstudiante')">✕</button>
    </div>
    <div class="modal-search">
      <input type="text" id="buscarEstudiante" placeholder="🔍  Buscar por nombre o NIE..." oninput="filtrarEstudiantes()">
    </div>
    <div class="modal-body" id="listaEstudiantes"></div>
  </div>
</div>

<!-- ══ MODAL DOCENTE ══ -->
<div class="modal-overlay" id="modalDocente">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2>Seleccionar Docente</h2>
      <button class="modal-close" onclick="cerrarModal('modalDocente')">✕</button>
    </div>
    <div class="modal-body" id="listaDocentes"></div>
  </div>
</div>

<!-- ══ MODAL MOTIVO ══ -->
<div class="modal-overlay" id="modalMotivo">
  <div class="modal">
    <div class="modal-header">
      <h2>Motivo del Demérito</h2>
      <button class="modal-close" onclick="cerrarModal('modalMotivo')">✕</button>
    </div>

<script>
async function descargarPDF() {
  const btn = document.getElementById('btnPDF');
  btn.classList.add('loading');
  btn.textContent = '⏳ Generando...';

  // Hide action buttons and modals during capture
  const actions = document.querySelector('.actions');
  actions.style.visibility = 'hidden';

  try {
    const { jsPDF } = window.jspdf;
    const element = document.querySelector('.card');

    const canvas = await html2canvas(element, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
    });

    // Letter size in mm: 215.9 x 279.4
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });

    const pageW = 215.9;
    const pageH = 279.4;
    const margin = 12; // mm margin on each side

    const availW = pageW - margin * 2;
    const availH = pageH - margin * 2;

    const imgW = canvas.width;
    const imgH = canvas.height;
    const ratio = imgW / imgH;

    let drawW = availW;
    let drawH = drawW / ratio;

    if (drawH > availH) {
      drawH = availH;
      drawW = drawH * ratio;
    }

    const offsetX = margin + (availW - drawW) / 2;
    const offsetY = margin + (availH - drawH) / 2;

    const imgData = canvas.toDataURL('image/png');
    pdf.addImage(imgData, 'PNG', offsetX, offsetY, drawW, drawH);

    // Filename with student name if available
    const alumno = document.getElementById('apellido_alumno').value || 'tarjeta';
    const fecha = document.getElementById('fecha').value || new Date().toISOString().split('T')[0];
    pdf.save(`demerito_${alumno}_${fecha}.pdf`);

  } catch (e) {
    alert('Error al generar PDF: ' + e.message);
    console.error(e);
  } finally {
    actions.style.visibility = 'visible';
    btn.classList.remove('loading');
    btn.textContent = '📄 PDF Carta';
  }
}
</script>
