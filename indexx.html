<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta de Demérito</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-dark:  #0a2463;
    --blue-mid:   #1565c0;
    --blue-light: #1e88e5;
    --blue-pale:  #e3f0ff;
    --white:      #ffffff;
    --ink:        #1a2540;
    --ink-light:  #4a5568;
    --line:       #b0c4de;
    --bg:         #eaf2fb;
    --paper:      #ffffff;
    --focus:      #1e88e5;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Sans 3', sans-serif;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse at 10% 10%, rgba(21,101,192,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 90%, rgba(10,36,99,0.10) 0%, transparent 55%);
  }

  .wrapper { width: 100%; max-width: 740px; }

  .card {
    background: var(--paper);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(10,36,99,0.08), 0 16px 48px rgba(10,36,99,0.16);
    animation: fadeIn 0.55s cubic-bezier(.22,.68,0,1.2);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── HEADER ── */
  .card-header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 60%, var(--blue-light) 100%);
    padding: 2rem 2.5rem 1.6rem;
    position: relative;
    overflow: hidden;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .card-header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 30%;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .holes {
    display: flex;
    justify-content: space-between;
    padding: 0 8%;
    margin-bottom: 1.2rem;
  }
  .hole {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.35);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.25);
  }

  .header-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    position: relative;
    z-index: 1;
  }

  .logo-seal {
    width: 58px; height: 58px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-seal svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 1.8; }

  .header-text { text-align: center; }

  .header-text h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.07em;
    color: var(--white);
    text-transform: uppercase;
    line-height: 1.35;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .header-text .district {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.76rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.8);
    margin-top: 0.3rem;
    text-transform: uppercase;
  }

  .title-badge {
    display: flex;
    justify-content: center;
    margin-top: 1.4rem;
    position: relative;
    z-index: 1;
  }
  .title-badge span {
    background: white;
    color: var(--blue-dark);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.88rem;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.45rem 2.2rem;
    border-radius: 50px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }

  /* ── BODY ── */
  .card-body { padding: 2rem 2.5rem 2.5rem; }

  .inst-strip {
    background: var(--blue-pale);
    border-left: 4px solid var(--blue-mid);
    border-radius: 0 6px 6px 0;
    padding: 0.9rem 1.2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.8rem;
  }

  .field { display: flex; flex-direction: column; gap: 3px; }

  .field label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--blue-mid);
  }

  .field input, .field textarea {
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--line);
    outline: none;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem;
    color: var(--ink);
    padding: 3px 2px 5px;
    transition: border-color 0.25s, background 0.25s;
  }

  .field input:focus, .field textarea:focus {
    border-bottom-color: var(--focus);
    background: rgba(30,136,229,0.04);
  }

  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--blue-mid);
    border-bottom: 2px solid var(--blue-pale);
    padding-bottom: 0.3rem;
    margin-bottom: 1rem;
    margin-top: 1.6rem;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  .grid-3 { display: grid; grid-template-columns: 0.8fr 1.2fr 1fr; gap: 1.2rem; }

  .textarea-field { margin-bottom: 1.2rem; }
  .textarea-field label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--blue-mid);
    display: block;
    margin-bottom: 0.35rem;
  }
  .textarea-field textarea {
    width: 100%;
    background: var(--blue-pale);
    border: 1.5px solid #c5d8f0;
    border-radius: 6px;
    outline: none;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.92rem;
    color: var(--ink);
    padding: 0.6rem 0.8rem;
    resize: none;
    min-height: 78px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .textarea-field textarea:focus {
    border-color: var(--focus);
    box-shadow: 0 0 0 3px rgba(30,136,229,0.12);
  }

  .signatures {
    margin-top: 1.8rem;
    background: var(--blue-pale);
    border-radius: 8px;
    padding: 1.4rem 1.6rem;
  }

  .sig-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--blue-mid);
    margin-bottom: 1.1rem;
  }

  .sig-row {
    display: grid;
    grid-template-columns: 1.7fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.1rem;
    align-items: end;
  }
  .sig-row:last-child { margin-bottom: 0; }

  .actions {
    display: flex;
    gap: 0.8rem;
    justify-content: flex-end;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1.5px solid var(--blue-pale);
  }

  .btn {
    padding: 0.6rem 1.6rem;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 50px;
    border: none;
  }

  .btn-outline {
    background: transparent;
    border: 2px solid var(--line);
    color: var(--ink-light);
  }
  .btn-outline:hover { border-color: var(--blue-mid); color: var(--blue-mid); }

  .btn-print {
    background: transparent;
    border: 2px solid var(--blue-mid);
    color: var(--blue-mid);
  }
  .btn-print:hover { background: var(--blue-pale); }

  .btn-primary {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-mid));
    color: white;
    box-shadow: 0 4px 14px rgba(21,101,192,0.35);
  }
  .btn-primary:hover {
    box-shadow: 0 6px 20px rgba(21,101,192,0.45);
    transform: translateY(-1px);
  }

  @media print {
    body { background: white; padding: 0; }
    .card { box-shadow: none; border-radius: 0; }
    .card-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .actions { display: none; }
  }

  @media (max-width: 580px) {
    .card-body { padding: 1.5rem 1.2rem; }
    .card-header { padding: 1.5rem 1.2rem 1.2rem; }
    .inst-strip, .grid-2, .grid-3, .sig-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="card">

    <div class="card-header">
      <div class="holes">
        <div class="hole"></div>
        <div class="hole"></div>
      </div>
      <div class="header-content">
        <div class="logo-seal">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5" stroke-linejoin="round"/>
            <path d="M2 12l10 5 10-5" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Ministerio de Educación,<br>Ciencia y Tecnología</h1>
          <p class="district">Distrito 06-14 &nbsp;·&nbsp; Panchimalco, San Salvador Sur</p>
        </div>
      </div>
      <div class="title-badge">
        <span>Tarjeta de Demérito</span>
      </div>
    </div>

    <div class="card-body">

      <div class="inst-strip">
        <div class="field">
          <label>Institución</label>
          <input type="text" name="institucion">
        </div>
        <div class="field">
          <label>Código</label>
          <input type="text" name="codigo">
        </div>
      </div>

      <div class="section-label">Datos del Alumno/A</div>
      <div class="grid-2" style="margin-bottom:1.2rem">
        <div class="field">
          <label>Nombre</label>
          <input type="text" name="nombre_alumno">
        </div>
        <div class="field">
          <label>Apellido</label>
          <input type="text" name="apellido_alumno">
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label>NIE</label>
          <input type="text" name="nie">
        </div>
        <div class="field">
          <label>Grado / Sección</label>
          <input type="text" name="grado_seccion">
        </div>
        <div class="field">
          <label>Fecha</label>
          <input type="date" name="fecha">
        </div>
      </div>

      <div class="section-label">Detalle del Demérito</div>
      <div class="textarea-field">
        <label>Motivo del Demérito</label>
        <textarea name="motivo" rows="3" placeholder="Describa el motivo..."></textarea>
      </div>
      <div class="textarea-field">
        <label>Observación del Docente</label>
        <textarea name="observacion" rows="3" placeholder="Observaciones adicionales..."></textarea>
      </div>

      <div class="signatures">
        <div class="sig-title">Firmas y Responsables</div>
        <div class="sig-row">
          <div class="field"><label>Nombre Docente</label><input type="text" name="nombre_docente"></div>
          <div class="field"><label>Firma</label><input type="text" name="firma_docente"></div>
        </div>
        <div class="sig-row">
          <div class="field"><label>Nombre Alumno</label><input type="text" name="nombre_alumno_firma"></div>
          <div class="field"><label>Firma</label><input type="text" name="firma_alumno"></div>
        </div>
        <div class="sig-row">
          <div class="field"><label>Nombre Responsable</label><input type="text" name="nombre_responsable"></div>
          <div class="field"><label>Firma</label><input type="text" name="firma_responsable"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-outline" onclick="document.querySelectorAll('input,textarea').forEach(el=>el.value='')">Limpiar</button>
        <button class="btn btn-print" onclick="window.print()">🖨 Imprimir</button>
        <button class="btn btn-primary" onclick="guardar()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<script>
function guardar() {
  const campos = {};
  document.querySelectorAll('input[name], textarea[name]').forEach(el => { campos[el.name] = el.value; });
  const blob = new Blob([JSON.stringify(campos, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tarjeta_demerito.json';
  a.click();
}
</script>
</body>
</html>
